backend:
  name: github
  repo: xuy669583-web/nw-campus-map
  branch: main
  base_url: https://nw-campus-map.pages.dev

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://nw-campus-map.pages.dev
logo_url: /badge.png

collections:
  - name: "pois"
    label: "POI兴趣点"
    folder: "content/pois"
    create: true
    slug: "{{name}}"
    fields:
      - {label: "名称", name: "name", widget: "string", required: true}
      - {label: "分类", name: "type", widget: "select", options: ["校门", "教学楼", "办公楼", "食堂", "宿舍", "景观", "文化场馆", "体育场馆", "院系", "服务设施", "医院", "图书馆"], required: true}
      - {label: "子分类", name: "subtype", widget: "string", required: false}
      - {label: "简介", name: "info", widget: "string", required: false}
      - {label: "详细描述", name: "description", widget: "markdown", required: false}
      - {label: "经度", name: "lng", widget: "number", value_type: "float", required: true}
      - {label: "纬度", name: "lat", widget: "number", value_type: "float", required: true}
      - label: "历史照片"
        name: "pastImages"
        widget: "list"
        field: {label: "图片路径", name: "url", widget: "string"}
      - label: "现状照片"
        name: "currentImages"
        widget: "list"
        field: {label: "图片路径", name: "url", widget: "string"}
      - {label: "排序权重", name: "sort", widget: "number", default: 0}
      - {label: "是否显示", name: "visible", widget: "boolean", default: true}
